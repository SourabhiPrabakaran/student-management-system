name: SMS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors pytest

      - name: Run unit tests
        run: pytest sms-project/test/ -v --tb=short

  validate-artifacts:
    name: Validate Configuration Items
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f sms-project/src/frontend/login.html && echo "login.html OK"
          test -f sms-project/src/backend/app.py && echo "app.py OK"
          test -f sms-project/database/schema.sql && echo "schema.sql OK"
          test -f sms-project/docs/requirements.md && echo "requirements.md OK"
          echo "All configuration items validated"

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-artifacts]
    if: always()
    steps:
      - name: Print build summary
        run: |
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Actor   : ${{ github.actor }}"
          echo "BUILD COMPLETE"