name: SMS CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  validate-artifacts:
    name: Validate Configuration Items
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f sms-project/src/frontend/login.html && echo "login.html OK"
          test -f sms-project/src/backend/app.py && echo "app.py OK"
          test -f sms-project/database/schema.sql && echo "schema.sql OK"
          test -f sms-project/docs/requirements.md && echo "requirements.md OK"
          echo "All CIs validated successfully"

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [validate-artifacts]
    steps:
      - name: Print build summary
        run: |
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "SMS BUILD COMPLETE"