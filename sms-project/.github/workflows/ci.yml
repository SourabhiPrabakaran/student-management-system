# ============================================================
# Student Management System — CI/CD Pipeline
# Course: ISWE403L Software Configuration Management
# Configuration Item: /.github/workflows/ci.yml
# Trigger: Push to main/develop, Pull Requests
# ============================================================

name: SMS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ─── Job 1: Lint & Test ──────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (flake8)
        run: |
          flake8 src/backend/ --max-line-length=120 --exclude=__pycache__
        continue-on-error: false

      - name: Run unit tests with coverage
        run: |
          pytest test/ -v --tb=short --cov=src/backend --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
        if: always()

  # ─── Job 2: Validate Files ───────────────────────────────────
  validate-artifacts:
    name: Validate Configuration Items
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          echo "=== Validating Configuration Items ==="
          files=(
            "src/frontend/login.html"
            "src/frontend/dashboard.html"
            "src/frontend/students.html"
            "src/backend/app.py"
            "database/schema.sql"
            "docs/requirements.md"
            "docs/design.md"
            "build/build.sh"
            "requirements.txt"
          )
          ALL_OK=true
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ MISSING: $f"
              ALL_OK=false
            fi
          done
          $ALL_OK || exit 1
          echo "=== All configuration items validated ==="

      - name: Validate SQL schema syntax
        run: |
          echo "Checking schema.sql for basic SQL syntax..."
          grep -q "CREATE TABLE" database/schema.sql && echo "✅ CREATE TABLE found" || exit 1
          grep -q "PRIMARY KEY" database/schema.sql  && echo "✅ PRIMARY KEY found" || exit 1

  # ─── Job 3: Security Scan ────────────────────────────────────
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for vulnerabilities
        run: |
          pip-audit -r requirements.txt --desc || true
        continue-on-error: true

  # ─── Job 4: Build Summary ────────────────────────────────────
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-artifacts]
    if: always()

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Print build summary
        run: |
          echo "================================================"
          echo "  SMS BUILD SUMMARY"
          echo "================================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Run #   : ${{ github.run_number }}"
          echo "  Date    : $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "================================================"
          echo "  Lint & Tests    : ${{ needs.lint-and-test.result }}"
          echo "  Validate CIs    : ${{ needs.validate-artifacts.result }}"
          echo "================================================"
