<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS — Students</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f1f3d; --navy2: #162849; --gold: #e8a020; --gold2: #f5bc4e;
    --bg: #f0f4f9; --white: #ffffff; --muted: #7a8599; --border: #e4e9f0;
    --text: #1a2540; --green: #1a9f6e; --green-bg: #edfaf4; --red: #e05252;
    --red-bg: #fff2f2; --blue: #2563eb; --blue-bg: #eff4ff;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

  .sidebar { width: 240px; min-height: 100vh; background: var(--navy); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; }
  .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo .logo-mark { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--white); }
  .sidebar-logo .logo-sub { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
  .sidebar-logo .gold-bar { width: 28px; height: 3px; background: var(--gold); border-radius: 2px; margin-top: 10px; }
  nav { padding: 20px 12px; flex: 1; }
  .nav-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 12px; margin-bottom: 8px; margin-top: 20px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px; font-size: 13.5px; font-weight: 500; color: rgba(255,255,255,0.55); cursor: pointer; transition: background 0.15s, color 0.15s; text-decoration: none; margin-bottom: 2px; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
  .nav-item.active { background: rgba(232,160,32,0.15); color: var(--gold2); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(255,255,255,0.06); border-radius: 10px; }
  .user-avatar { width: 32px; height: 32px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--navy); flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 500; color: var(--white); }
  .user-role { font-size: 11px; color: rgba(255,255,255,0.4); }
  .logout-btn { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 6px; transition: color 0.2s; }
  .logout-btn:hover { color: var(--red); }

  .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar h1 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--navy); }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--navy); color: var(--white); }
  .btn-primary:hover { background: var(--navy2); }

  .content { padding: 32px; flex: 1; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .search-box { flex: 1; max-width: 320px; position: relative; }
  .search-box input { width: 100%; padding: 10px 16px 10px 38px; background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; font-size: 13.5px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: var(--gold); }
  .search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }
  .filter-select { padding: 10px 14px; background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; }

  /* Table card */
  .card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 13px 20px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; text-align: left; background: #fafbfc; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbff; }
  tbody td { padding: 15px 20px; font-size: 13.5px; }
  .student-name { font-weight: 600; color: var(--navy); }
  .student-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .reg-no { font-family: 'DM Sans', monospace; font-size: 12px; color: var(--muted); }
  .cgpa-pill { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
  .cgpa-high { background: var(--green-bg); color: var(--green); }
  .cgpa-mid  { background: #fff8ec; color: #d97706; }
  .cgpa-low  { background: var(--red-bg); color: var(--red); }
  .year-badge { display: inline-block; background: var(--blue-bg); color: var(--blue); padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
  .action-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 6px; font-size: 14px; transition: background 0.15s; }
  .action-btn:hover { background: var(--bg); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(15,31,61,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--white); border-radius: 20px; padding: 36px; width: 480px; max-width: 90vw; box-shadow: 0 24px 60px rgba(0,0,0,0.2); transform: translateY(16px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--navy); margin-bottom: 24px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11.5px; font-weight: 600; color: var(--navy); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
  .form-group input, .form-group select { width: 100%; padding: 11px 14px; background: #f7f9fc; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13.5px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--gold); background: var(--white); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .btn-cancel { background: var(--bg); color: var(--muted); border: none; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: var(--white); padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 500; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success::before { content: '✓ '; color: #4ade80; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">SMS</div>
    <div class="logo-sub">Student Management System</div>
    <div class="gold-bar"></div>
  </div>
  <nav>
    <div class="nav-label">Main</div>
    <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
    <a class="nav-item active" href="students.html"><span class="icon">👥</span> Students</a>
    <a class="nav-item" href="#"><span class="icon">📚</span> Courses</a>
    <a class="nav-item" href="#"><span class="icon">📅</span> Attendance</a>
    <div class="nav-label">SCM</div>
    <a class="nav-item" href="https://github.com" target="_blank"><span class="icon">🔗</span> GitHub Repo</a>
    <a class="nav-item" href="#"><span class="icon">🏷️</span> Releases</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar">A</div>
      <div><div class="user-name">Admin</div><div class="user-role">Administrator</div></div>
      <button class="logout-btn" onclick="window.location.href='login.html'">⏻</button>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <h1>Students</h1>
    <button class="btn btn-primary" onclick="openModal()">＋ Add Student</button>
  </div>

  <div class="content">
    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name or reg. no…" oninput="filterTable()">
      </div>
      <select class="filter-select" id="yearFilter" onchange="filterTable()">
        <option value="">All Years</option>
        <option value="1">Year 1</option>
        <option value="2">Year 2</option>
      </select>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Reg No</th>
            <th>Year</th>
            <th>CGPA</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
          <tr><td colspan="5" style="text-align:center;color:var(--muted);padding:32px">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Student Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Add New Student</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Registration No</label>
        <input type="text" id="newRegNo" placeholder="VIT2024006">
      </div>
      <div class="form-group">
        <label>Year</label>
        <select id="newYear"><option value="1">Year 1</option><option value="2">Year 2</option></select>
      </div>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="newName" placeholder="e.g. Meera Iyer">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="newEmail" placeholder="meera.i@vit.ac.in">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Course</label>
        <select id="newCourse">
          <option>M.Tech SE</option>
          <option>M.Tech CS</option>
          <option>M.Tech IS</option>
        </select>
      </div>
      <div class="form-group">
        <label>CGPA</label>
        <input type="number" id="newCgpa" placeholder="8.5" min="0" max="10" step="0.1">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let students = [];

const DEMO_STUDENTS = [
  {id:1, reg_no:'VIT2024001', name:'Arjun Kumar',  email:'arjun.k@vit.ac.in',  course:'M.Tech SE', year:1, cgpa:8.7},
  {id:2, reg_no:'VIT2024002', name:'Priya Sharma', email:'priya.s@vit.ac.in',  course:'M.Tech SE', year:1, cgpa:9.1},
  {id:3, reg_no:'VIT2024003', name:'Rahul Verma',  email:'rahul.v@vit.ac.in',  course:'M.Tech SE', year:2, cgpa:7.8},
  {id:4, reg_no:'VIT2024004', name:'Sneha Patel',  email:'sneha.p@vit.ac.in',  course:'M.Tech SE', year:1, cgpa:8.3},
  {id:5, reg_no:'VIT2024005', name:'Karthik Rajan',email:'karthik.r@vit.ac.in',course:'M.Tech SE', year:2, cgpa:9.4},
];

async function loadStudents() {
  try {
    const res = await fetch('/api/students');
    const json = await res.json();
    students = json.data;
  } catch {
    students = [...DEMO_STUDENTS];
  }
  renderTable(students);
}

function renderTable(data) {
  const tbody = document.getElementById('studentTableBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:32px">No students found.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(s => {
    const cls = s.cgpa >= 9 ? 'cgpa-high' : s.cgpa >= 8 ? 'cgpa-mid' : 'cgpa-low';
    return `<tr>
      <td>
        <div class="student-name">${s.name}</div>
        <div class="student-email">${s.email}</div>
      </td>
      <td><span class="reg-no">${s.reg_no}</span></td>
      <td><span class="year-badge">Year ${s.year}</span></td>
      <td><span class="cgpa-pill ${cls}">${s.cgpa}</span></td>
      <td>
        <button class="action-btn" title="Delete" onclick="deleteStudent(${s.id})">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const yr = document.getElementById('yearFilter').value;
  const filtered = students.filter(s =>
    (s.name.toLowerCase().includes(q) || s.reg_no.toLowerCase().includes(q)) &&
    (yr === '' || String(s.year) === yr)
  );
  renderTable(filtered);
}

async function addStudent() {
  const reg_no = document.getElementById('newRegNo').value.trim();
  const name   = document.getElementById('newName').value.trim();
  const email  = document.getElementById('newEmail').value.trim();
  const course = document.getElementById('newCourse').value;
  const year   = parseInt(document.getElementById('newYear').value);
  const cgpa   = parseFloat(document.getElementById('newCgpa').value) || 0;

  if (!reg_no || !name || !email) { showToast('Please fill all required fields.', false); return; }

  const newStudent = { id: students.length + 1, reg_no, name, email, course, year, cgpa };
  try {
    await fetch('/api/students', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(newStudent) });
  } catch {}

  students.push(newStudent);
  renderTable(students);
  closeModal();
  showToast('Student added successfully!', true);
}

async function deleteStudent(id) {
  if (!confirm('Delete this student record?')) return;
  try { await fetch(`/api/students/${id}`, { method: 'DELETE' }); } catch {}
  students = students.filter(s => s.id !== id);
  renderTable(students);
  showToast('Student deleted.', true);
}

function openModal()  { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function showToast(msg, success=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (success ? ' success' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

loadStudents();
</script>
</body>
</html>
